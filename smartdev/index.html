<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#040810;--bg2:#080f1e;--blue:#00aaff;--white:#f0f4ff;--muted:#5a6a88;--glass:rgba(0,170,255,0.06);--border:rgba(0,170,255,0.12)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;overflow-x:hidden}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 6%;height:68px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(16px);background:rgba(4,8,16,0.8);border-bottom:1px solid var(--border)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.25rem;letter-spacing:-.02em}
.logo span{color:var(--blue)}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.875rem;font-weight:500;transition:color .2s}
.nav-links a:hover{color:var(--white)}
.nav-right{display:flex;align-items:center;gap:1rem}
.lang-switcher{display:flex;gap:4px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:3px}
.lang-btn{background:none;border:none;color:var(--muted);font-size:.75rem;font-weight:700;padding:.3rem .6rem;border-radius:5px;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;letter-spacing:.03em}
.lang-btn.active{background:var(--blue);color:#040810}
.lang-btn:hover:not(.active){color:var(--white)}
.nav-cta{background:var(--blue);color:#040810;padding:.5rem 1.25rem;border-radius:6px;text-decoration:none;font-size:.875rem;font-weight:600;transition:opacity .2s}
.nav-cta:hover{opacity:.85}

.hero{min-height:100dvh;display:flex;align-items:center;padding:0 6%;position:relative;overflow:hidden}
.hero-glow{position:absolute;top:-20%;left:-10%;width:700px;height:700px;background:radial-gradient(circle,rgba(0,170,255,0.12) 0%,transparent 70%);pointer-events:none}
.hero-glow2{position:absolute;bottom:-20%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(0,102,204,0.1) 0%,transparent 70%);pointer-events:none}
.hero-content{max-width:760px;position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:.5rem;background:var(--glass);border:1px solid var(--border);border-radius:999px;padding:.35rem 1rem;font-size:.75rem;color:var(--blue);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:2rem}
.hero-badge::before{content:'';width:6px;height:6px;background:var(--blue);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
h1{font-family:'Syne',sans-serif;font-size:clamp(2.8rem,7vw,5.5rem);font-weight:800;line-height:1.05;letter-spacing:-.03em;margin-bottom:1.5rem}
h1 span{color:var(--blue)}
.hero-sub{font-size:1.1rem;color:var(--muted);line-height:1.7;max-width:520px;margin-bottom:2.5rem}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap}
.btn-primary{background:var(--blue);color:#040810;padding:.85rem 2rem;border-radius:8px;text-decoration:none;font-weight:700;font-size:.95rem;transition:transform .2s,opacity .2s}
.btn-primary:hover{transform:translateY(-2px);opacity:.9}
.btn-ghost{border:1px solid var(--border);color:var(--white);padding:.85rem 2rem;border-radius:8px;text-decoration:none;font-weight:500;font-size:.95rem;transition:border-color .2s,background .2s}
.btn-ghost:hover{border-color:var(--blue);background:var(--glass)}
.hero-stats{display:flex;gap:3rem;margin-top:4rem;padding-top:3rem;border-top:1px solid var(--border)}
.stat-num{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;color:var(--blue)}
.stat-label{font-size:.8rem;color:var(--muted);margin-top:.2rem}

.section{padding:100px 6%}
.section-tag{font-size:.75rem;font-weight:700;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem}
.section-title{font-family:'Syne',sans-serif;font-size:clamp(2rem,4vw,3rem);font-weight:800;letter-spacing:-.02em;margin-bottom:1.5rem}
.section-sub{color:var(--muted);font-size:1rem;line-height:1.7;max-width:480px;margin-bottom:4rem}
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5px;background:var(--border);border-radius:16px;overflow:hidden}
.service-card{background:var(--bg2);padding:2.5rem 2rem;position:relative;transition:background .3s;cursor:default}
.service-card:hover{background:var(--glass)}
.service-card::before{content:attr(data-num);position:absolute;top:1.5rem;right:1.5rem;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--border)}
.service-icon{width:48px;height:48px;background:var(--glass);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;font-size:1.4rem}
.service-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:.75rem}
.service-desc{font-size:.875rem;color:var(--muted);line-height:1.65}

.process-section{background:var(--bg2);padding:100px 6%}
.process-steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:2rem;margin-top:4rem;position:relative}
.process-steps::before{content:'';position:absolute;top:28px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}
.step{position:relative}
.step-num{width:56px;height:56px;background:var(--bg);border:1px solid var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--blue);margin-bottom:1.25rem;position:relative;z-index:1}
.step-title{font-family:'Syne',sans-serif;font-weight:700;margin-bottom:.5rem}
.step-desc{font-size:.85rem;color:var(--muted);line-height:1.6}

.why-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.why-list{display:flex;flex-direction:column;gap:1.5rem;margin-top:2rem}
.why-item{display:flex;gap:1rem;align-items:flex-start}
.why-check{width:28px;height:28px;min-width:28px;background:var(--glass);border:1px solid var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:.9rem;margin-top:.1rem}
.why-text strong{display:block;font-weight:600;margin-bottom:.3rem}
.why-text span{font-size:.875rem;color:var(--muted);line-height:1.6}
.why-visual{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2.5rem;display:flex;flex-direction:column;gap:1rem}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:1rem;background:var(--glass);border-radius:10px;border:1px solid var(--border)}
.metric-label{font-size:.85rem;color:var(--muted)}
.metric-val{font-family:'Syne',sans-serif;font-weight:800;color:var(--blue);font-size:1.1rem}

.cta-section{padding:120px 6%;text-align:center;position:relative;overflow:hidden}
.cta-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:800px;height:400px;background:radial-gradient(ellipse,rgba(0,170,255,0.1) 0%,transparent 70%);pointer-events:none}
.cta-section h2{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,4rem);font-weight:800;letter-spacing:-.03em;margin-bottom:1rem;position:relative;z-index:1}
.cta-section p{color:var(--muted);font-size:1.05rem;margin-bottom:2.5rem;position:relative;z-index:1}
.cta-contacts{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;position:relative;z-index:1}
.cta-phone{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--blue);text-decoration:none;display:block;margin-bottom:2rem;transition:opacity .2s;position:relative;z-index:1}
.cta-phone:hover{opacity:.8}

footer{padding:40px 6%;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.footer-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem}
.footer-logo span{color:var(--blue)}
footer p{font-size:.8rem;color:var(--muted)}

.fade-up{opacity:0;transform:translateY(30px);transition:opacity .6s ease,transform .6s ease}
.fade-up.visible{opacity:1;transform:none}

/* CONTACT POPUP */
.nav-right{position:relative}
.contact-popup{position:absolute;top:calc(100% + 10px);right:0;background:#0d1426;border:1px solid var(--border);border-radius:12px;padding:.5rem;display:flex;flex-direction:column;gap:4px;min-width:200px;opacity:0;pointer-events:none;transform:translateY(-8px);transition:all .2s;z-index:999}
.contact-popup.open{opacity:1;pointer-events:all;transform:translateY(0)}
.contact-popup a{display:flex;align-items:center;gap:.6rem;padding:.7rem 1rem;border-radius:8px;color:var(--white);text-decoration:none;font-size:.875rem;font-weight:500;transition:background .15s}
.contact-popup a:hover{background:var(--glass)}
#contactPopup2{position:absolute;top:calc(100% + 10px);left:0;background:#0d1426;border:1px solid var(--border);border-radius:12px;padding:.5rem;display:flex;flex-direction:column;gap:4px;min-width:200px;opacity:0;pointer-events:none;transform:translateY(-8px);transition:all .2s;z-index:999}
#contactPopup2.open{opacity:1;pointer-events:all;transform:translateY(0)}

@media(max-width:768px){
  .hero-stats{gap:2rem;flex-wrap:wrap}
  .why-grid{grid-template-columns:1fr}
  .why-visual{display:none}
  .nav-links{display:none}
  .process-steps::before{display:none}
}
</style>

let currentLang = localStorage.getItem('sd_lang') || 'uz';

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('sd_lang', lang);
  document.documentElement.lang = lang;
  const t = T[lang];
  document.querySelectorAll('[data-i]').forEach(el => {
    const key = el.getAttribute('data-i');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === lang.toUpperCase());
  });
}

setLang(currentLang);

function toggleContact(e){
  e.stopPropagation();
  document.getElementById('contactPopup').classList.toggle('open');
  document.getElementById('contactPopup2')?.classList.remove('open');
}
function toggleContact2(e){
  e.stopPropagation();
  document.getElementById('contactPopup2').classList.toggle('open');
  document.getElementById('contactPopup')?.classList.remove('open');
}
document.addEventListener('click', ()=>{
  document.getElementById('contactPopup')?.classList.remove('open');
  document.getElementById('contactPopup2')?.classList.remove('open');
});

const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible') });
}, {threshold: 0.1});
document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
</script>
